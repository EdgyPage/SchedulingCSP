# Render blueprint for the SchedulingCSP web service.
# Deploy with: Render dashboard -> New -> Blueprint -> connect this repo.
# See README "Deployment" for the manual dashboard steps and env-var notes.
services:
  - type: web
    name: schedulingcsp
    runtime: python
    plan: free
    region: oregon            # adjust to nearest region
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"        # pins runtime; app uses PEP 604 `str | None` (needs >=3.10)
      - key: API_KEY
        generateValue: true    # Render generates a random secret; read it from the dashboard
      - key: ALLOWED_ORIGINS
        sync: false            # set to the real frontend origin when one exists; CORS only affects browsers
